- name: Removes anonymous user account for localhost
  community.mysql.mysql_user:
    name: ''
    host: localhost
    state: absent
    login_unix_socket: /run/mysqld/mysqld.sock

- name: Create zabbix database
  community.mysql.mysql_db:
    name: zabbix
    encoding: utf8mb4
    collation: utf8mb4_bin
    state: present
    login_unix_socket: /run/mysqld/mysqld.sock

- name: Create database user zabbix
  community.mysql.mysql_user:
    name: zabbix
    host: localhost
    password: "{{ zabbix_db_password }}"
    priv: 'zabbix.*:ALL'
    state: present
    login_unix_socket: /run/mysqld/mysqld.sock

- name: Check if Zabbix schema is already present
  community.mysql.mysql_query:
    login_user: zabbix
    login_password: "{{ zabbix_db_password }}"
    login_db: zabbix
    query: "SHOW TABLES LIKE 'users';"

- name: Import zabbix database schema
  when: zabbix_schema_check is defined and zabbix_schema_check.query_result[0] | length == 0
  block:
    - name: Enable log_bin_trust_function_creators
      community.mysql.mysql_variables:
        variable: log_bin_trust_function_creators
        value: 1
        login_unix_socket: /run/mysqld/mysqld.sock

    - name: Import Zabbix database schema
      ansible.builtin.shell: |
        set -o pipefail
        zcat {{ zabbix_sql_file }} | mysql --default-character-set=utf8mb4 -uzabbix -p{{ zabbix_db_password }} zabbix
      args:
        executable: /bin/bash

    - name: Enable log_bin_trust_function_creators
      community.mysql.mysql_variables:
        variable: log_bin_trust_function_creators
        value: 0
        login_unix_socket: /run/mysqld/mysqld.sock
