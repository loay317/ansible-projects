---
- name: create link to run on web for dev
  hosts: prod
  tasks: 

    - name: check if group exist and if not exist create it
      group:
        name: devops
        state: present
    - name: create directory
      file:
        path: /webdev
        state: directory
        mode: "2775"
        owner: devops
        group: devops

    - name: create index file
      copy:
        content: "Devlopment"
        dest: /var/www/html/webdev/index.html

    - name: create link
      file:
        src: /webdev
        dest: /var/www/html/webdev
        owner: root
        group: devops
        state: link

    - name: apply security context needed
      community.general.sefcontext:
        target: '/webdev(/.*)?'
        setype: httpd_sys_content_t
        state: present

    - name: apply security context
      ansible.builtin.command: restorecon -irv /webdev

