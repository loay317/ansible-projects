---
# tasks file for mweb
- name: Configure web server
  dnf:
    name: 
     - httpd
     - firewalld
    state: latest
- name: start and enable services
  service:
    name: "{{ item }}"
    state: started
    enabled: true
  loop:
   - httpd
   - firewalld

- name: Run Firewalld
  ansible.posix.firewalld:
    service: http
    state: enabled
    permanent: true
    immediate: true
    offline: true

- name: copy j2 file
  template: 
    src: index.j2
    dest: /var/www/html/index.html
